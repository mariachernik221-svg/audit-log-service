services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: audit_log
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audit_log
      SPRING_DATASOURCE_USERNAME: audit
      SPRING_DATASOURCE_PASSWORD: audit
    depends_on:
      - postgres

volumes:
  pgdata:
